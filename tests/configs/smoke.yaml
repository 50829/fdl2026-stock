seed: 42

data:
  daily_dir: documents-export-2026-5-18/daily
  start_date: "2016-01-04"
  end_date: "2016-04-29"
  limit_files: 90
  usecols:
    - ts_code
    - trade_date
    - open
    - high
    - low
    - close
    - pre_close
    - vol
    - amount
    - vwap
  extra_daily_dirs: []
  extra_feature_cols: []
  pool:
    basic_csv: documents-export-2026-5-18/basic.csv
    stock_st_dir: documents-export-2026-5-18/stock_st
    exclude_bj: true
    exclude_st: true

split:
  train_end: "2016-03-31"
  val_end: "2016-04-29"

task:
  horizon: 1

model:
  seq_len: 10
  hidden: 32
  dropout: 0.0
  normalize: window

train:
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0
  epochs: 1
  use_tqdm: true
  log_every: 50
  grad_clip: 0.0
  shuffle: true
  num_workers: 0
  save_path: outputs/smoke/ckpt.pt

eval:
  ckpt: outputs/smoke/ckpt.pt
  batch_size: 512
  num_workers: 0
  pred_path: outputs/smoke/val_pred.csv
  add_ic_to_pred: true
  ic_by_day_path: outputs/smoke/ic_by_day.csv
  metrics_path: outputs/smoke/eval_metrics.csv

backtest:
  enabled: true
  strategy:
    name: topk_rotate
    params:
      n_hold: 20
      k_rotate: 5
      transaction_cost_bps: 0.0
      trading_days_per_year: 252
  curve_path: outputs/smoke/bt_curve.csv
