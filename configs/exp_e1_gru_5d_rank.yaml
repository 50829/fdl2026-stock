data:
  processed_dir: data/processed

task:
  label: label_5d__cs_rank

model:
  name: alstm
  seq_len: 60
  input_dim: 112
  hidden_size: 128
  num_layers: 2
  rnn_type: GRU
  dropout: 0.2
  attention_hidden_ratio: 0.5

train:
  seed: 2026
  batch_size: 4096
  epochs: 3
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 3.0
  filter_in_universe: true
  cache_data: true
  use_tqdm: false
  save_path: outputs/models/e1_gru_5d_rank.pt

predict:
  ckpt: outputs/models/e1_gru_5d_rank.pt
  split: test
  batch_size: 4096
  use_tqdm: false
  output_path: outputs/predictions/e1_gru_5d_rank_test.parquet
