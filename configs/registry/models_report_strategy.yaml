      test: outputs/models/20260611_210718__report_label5d_lgb_top40_rerun/lightgbm/test/test_pred.parquet
  label5d_xgb:
    description: 报告策略实验对照：label5d XGBoost。
    predictions:
      valid: outputs/models/20260611_210936__report_label5d_xgb_top40_rerun/xgboost/valid/valid_pred.parquet
      test: outputs/models/20260611_210936__report_label5d_xgb_top40_rerun/xgboost/test/test_pred.parquet

