    description: label1d residual-rank MLP，验证集最优 alpha=0。
    predictions:
      valid: outputs/models/20260601_000000__label1d_fusion_top40/residual_rank_mlp/valid/valid_pred.parquet
      test: outputs/models/20260601_000000__label1d_fusion_top40/residual_rank_mlp/test/test_pred.parquet

