models:
  label5d_final:
    description: label5d 最终 residual-rank 模型，alpha=1.5。
    predictions:
      valid: outputs/models/20260531_162154__final_model_handoff/valid/valid_pred.parquet
      test: outputs/models/20260531_162154__final_model_handoff/test/test_pred.parquet
  label1d_lgb:
    description: label1d LightGBM top40 模型。
    predictions:
