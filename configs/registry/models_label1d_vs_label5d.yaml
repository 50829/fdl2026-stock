      test: outputs/models/20260601_000000__label1d_top40/lightgbm/test/test_pred.parquet
  label1d_xgb:
    description: label1d XGBoost top40 模型。
    predictions:
      valid: outputs/models/20260601_000000__label1d_top40/xgboost/valid/valid_pred.parquet
      test: outputs/models/20260601_000000__label1d_top40/xgboost/test/test_pred.parquet
