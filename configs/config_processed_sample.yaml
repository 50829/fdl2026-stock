data:
  processed_dir: data/processed_sample

task:
  label: label_1d

model:
  name: alstm
  seq_len: 2
  input_dim: 2
  hidden_size: 8
  num_layers: 1
  rnn_type: GRU
  dropout: 0.1
  attention_hidden_ratio: 0.5

train:
  seed: 2026
  batch_size: 64
  epochs: 1
  learning_rate: 0.001
  weight_decay: 0.0
  grad_clip: 0.0
  filter_in_universe: true
  use_tqdm: false
  save_path: outputs/smoke_src/ckpt.pt

predict:
  ckpt: outputs/smoke_src/ckpt.pt
  split: test
  batch_size: 128
  use_tqdm: false
  output_path: outputs/smoke_src/pred_test.parquet
  warmup_start_date: "20240104"
