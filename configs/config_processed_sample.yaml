data:
  processed_dir: data/processed_sample

task:
  label: label_1d

model:
  name: mlp
  hidden: 32
  dropout: 0.0

train:
  seed: 2026
  batch_size: 64
  epochs: 1
  learning_rate: 0.001
  weight_decay: 0.0
  grad_clip: 0.0
  filter_in_universe: true
  use_tqdm: false
  save_path: outputs/smoke_src/ckpt.pt

predict:
  ckpt: outputs/smoke_src/ckpt.pt
  split: test
  batch_size: 128
  use_tqdm: false
  output_path: outputs/smoke_src/pred_test.parquet

