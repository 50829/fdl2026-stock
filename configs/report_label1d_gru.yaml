data:
  processed_dir: data/processed

task:
  label: label_1d__cs_rank

model:
  name: alstm
  seq_len: 60
  input_dim: 112
  hidden_size: 128
  num_layers: 1
  rnn_type: GRU
  dropout: 0.2
  attention_hidden_ratio: 0.5
  use_attention: true

train:
  seed: 2026
  batch_size: 4096
  epochs: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 3.0
  filter_in_universe: true
  cache_data: true
  loss: smooth_l1
  patience: 2
  min_delta: 0.0
  use_tqdm: true
  save_path: outputs/models/20260611_000000__report_model_benchmark/gru_label1d/best.pt

predict:
  ckpt: outputs/models/20260611_000000__report_model_benchmark/gru_label1d/best.pt
  batch_size: 4096
  use_tqdm: true

backtest:
  mode: topk
  return_col: label_1d
  n_hold: 10
  k_rotate: 2
  step_days: 1
  transaction_cost_bps: 5.0
