data:
  processed_dir: data/processed

task:
  label: label_1d__cs_rank

model:
  name: mlp
  hidden: 256
  dropout: 0.2

train:
  seed: 2026
  batch_size: 8192
  epochs: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 3.0
  filter_in_universe: true
  cache_data: true
  loss: smooth_l1
  patience: 2
  min_delta: 0.0
  use_tqdm: true
  save_path: outputs/models/20260611_000000__report_model_benchmark/mlp_label1d/best.pt

predict:
  ckpt: outputs/models/20260611_000000__report_model_benchmark/mlp_label1d/best.pt
  batch_size: 8192
  use_tqdm: true

backtest:
  mode: topk
  return_col: label_1d
  n_hold: 10
  k_rotate: 2
  step_days: 1
  transaction_cost_bps: 5.0
