data:
  raw_dir: data/raw
  processed_dir: data/processed

sample:
  start_date: "20190101"
  train_end: "20231231"
  valid_end: "20241231"
  lookback: 60
  horizon: 1

universe:
  min_list_days: 60

train:
  seed: 2026
  batch_size: 256
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0
  grad_clip: 0.0
  filter_in_universe: true
  use_tqdm: true
  save_path: outputs/models/ckpt.pt

task:
  label: label_1d

model:
  name: mlp
  hidden: 256
  dropout: 0.0

predict:
  ckpt: outputs/models/ckpt.pt
  split: test
  batch_size: 4096
  use_tqdm: true
