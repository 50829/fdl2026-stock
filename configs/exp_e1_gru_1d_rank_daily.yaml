data:
  processed_dir: data/processed

task:
  label: label_1d__cs_rank

model:
  name: alstm
  seq_len: 60
  input_dim: 112
  hidden_size: 128
  num_layers: 1
  rnn_type: GRU
  dropout: 0.2
  attention_hidden_ratio: 0.5
  use_attention: true

train:
  seed: 2026
  batch_size: 4096
  epochs: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 3.0
  filter_in_universe: true
  cache_data: true
  loss: smooth_l1
  patience: 2
  min_delta: 0.0
  use_tqdm: false
  save_path: outputs/models/e1_gru_1d_rank_daily.pt

predict:
  ckpt: outputs/models/e1_gru_1d_rank_daily.pt
  split: test
  batch_size: 4096
  use_tqdm: false
  output_path: outputs/predictions/e1_gru_1d_rank_daily_test.parquet

backtest:
  return_col: label_1d
  n_hold: 20
  k_rotate: 20
  step_days: 1
  transaction_cost_bps: 5.0
